<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="image" href="autoload/Hero.webp" fetchpriority="high">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&amp;display=swap" rel="stylesheet">
<style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body::selection { background: #fff; color: #000; }

        /* ── Layout crítico (substitui Tailwind na home) ── */
        main { display: block; }
        .scroll-stage { height: 250vh; }
        .hero-section {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-poster, .parallax-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-poster {
            opacity: 1;
            transition: opacity 0.8s ease;
            z-index: 1;
        }
        .parallax-video {
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 2;
        }
        .parallax-video.is-ready { opacity: 1; }
        .hero-section.video-ready .hero-poster { opacity: 0; }
        @media (min-width: 768px) {
            .parallax-video.is-ready { opacity: 0.8; }
        }
        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 3;
        }
        #btn-wrap {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .liquid-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* ── Cinematic exit curtain ── */
        #exit-curtain {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.9s cubic-bezier(0.76, 0, 0.24, 1);
        }
        #exit-curtain.closing {
            opacity: 1;
        }

        /* ── Scroll Reveal ── */
        [data-reveal] {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        [data-reveal="left"]  { transform: translateX(-60px) translateY(0); }
        [data-reveal="right"] { transform: translateX(60px) translateY(0); }
        [data-reveal="scale"] { transform: scale(0.90); opacity: 0; }
        [data-reveal="line"]  {
            transform: none;
            opacity: 0;
            clip-path: inset(0 100% 0 0);
            transition: opacity 0.01s, clip-path 1.1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        [data-reveal].is-visible {
            opacity: 1;
            transform: none;
            clip-path: inset(0 0% 0 0);
        }
        [data-delay="1"] { transition-delay: 0.1s; }
        [data-delay="2"] { transition-delay: 0.2s; }
        [data-delay="3"] { transition-delay: 0.3s; }
        [data-delay="4"] { transition-delay: 0.45s; }
        [data-delay="5"] { transition-delay: 0.6s; }

        /* ── Parallax ── */
        .parallax-video { will-change: transform; }
        .hero-content   { will-change: transform, opacity; }

        /* ── Catalog button glass ── */
        .catalog-btn {
            position: relative;
            overflow: hidden;
            padding: 16px 40px;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transform-origin: center center;
            background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 4px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .catalog-btn:active { transform: scale(0.95); }
        .catalog-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.0) 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: inherit;
        }
        .catalog-btn:hover::before { opacity: 1; }
        .catalog-btn span { position: relative; z-index: 10; }
    </style>
</head>
<body>
<div id="exit-curtain"></div>
<main>
<div class="scroll-stage">
    <section class="hero-section" id="hero-section">
        <img src="autoload/Hero.webp" alt="" class="hero-poster" decoding="async" fetchpriority="high">
        <video
            muted
            loop
            playsinline
            preload="none"
            poster="autoload/Hero.webp"
            class="parallax-video"
            id="hero-video"
            data-src="autoload/home-video/hero%2010.52.48.mp4?v=1777469817"
        ></video>
        <div class="video-overlay"></div>
        <div id="btn-wrap">
            <button id="catalog-btn" onclick="goToCatalog()" class="catalog-btn">
                <span>Acesse o nosso catálogo</span>
            </button>
        </div>
    </section>
</div>
</main>

<script>
(function () {
  const video   = document.getElementById('hero-video');
  const btn     = document.getElementById('catalog-btn');
  let   current = 1;
  let   target  = 1;
  let   rafId   = null;

  // Lazy-load do vídeo: só começa a baixar após o page paint inicial,
  // pra não bloquear o render da home no mobile.
  function tryPlay() {
    const p = video.play();
    if (p && typeof p.catch === 'function') p.catch(() => {});
  }

  function loadVideo() {
    if (video.dataset.loaded) return;
    video.dataset.loaded = '1';
    const src = video.dataset.src;
    if (!src) return;

    // iOS exige estes flags via propriedade JS, não só atributo
    video.muted = true;
    video.playsInline = true;
    video.setAttribute('webkit-playsinline', '');
    video.setAttribute('playsinline', '');
    video.setAttribute('muted', '');

    video.src = src;
    video.load();

    const onReady = () => {
      video.classList.add('is-ready');
      document.getElementById('hero-section').classList.add('video-ready');
      tryPlay();
    };

    if (video.readyState >= 2) onReady();
    else {
      video.addEventListener('loadeddata', onReady, { once: true });
      video.addEventListener('canplay', onReady, { once: true });
    }

    // Failsafe: se o autoplay programático for bloqueado (iOS low-power, etc.),
    // tenta de novo no primeiro toque/click do usuário.
    const retry = () => { tryPlay(); cleanup(); };
    const cleanup = () => {
      window.removeEventListener('touchstart', retry);
      window.removeEventListener('click', retry);
    };
    window.addEventListener('touchstart', retry, { passive: true });
    window.addEventListener('click', retry);
  }

  // Dispara após carregamento completo da página, com failsafe de 2s
  // (caso o evento load demore mais por algum recurso lento).
  let fired = false;
  const fire = () => { if (!fired) { fired = true; loadVideo(); } };
  if (document.readyState === 'complete') {
    setTimeout(fire, 0);
  } else {
    window.addEventListener('load', fire, { once: true });
    setTimeout(fire, 2000);
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function animate() {
    current = lerp(current, target, 0.08);
    btn.style.transform = `scale(${current})`;
    if (Math.abs(current - target) > 0.001) {
      rafId = requestAnimationFrame(animate);
    } else {
      rafId = null;
    }
  }

  function onScroll() {
    const sy       = Math.max(0, window.scrollY);
    const progress = Math.min(sy / window.innerHeight, 1);
    target = 1 + progress * 0.65;
    if (!rafId) rafId = requestAnimationFrame(animate);
  }

  window.addEventListener('scroll', onScroll, { passive: true });
})();

function goToCatalog() {
  const curtain = document.getElementById('exit-curtain');
  const btn     = document.querySelector('.catalog-btn');
  const hero    = document.querySelector('.hero-section');

  btn.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
  btn.style.opacity    = '0';
  btn.style.transform  = 'scale(0.94)';

  hero.style.transition = 'transform 1s cubic-bezier(0.76, 0, 0.24, 1)';
  hero.style.transform  = 'scale(1.1)';

  setTimeout(() => curtain.classList.add('closing'), 120);
  setTimeout(() => { window.location.href = 'catalogo.html'; }, 1050);
}
</script>
</body></html>
